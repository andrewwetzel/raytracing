name: Rust CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: |
          cd packages/raytrace_core && cargo fmt --all -- --check
          cd ../ionotrace-python && cargo fmt --all -- --check

      - name: Clippy
        run: |
          cd packages/raytrace_core && cargo clippy --all-targets --all-features -- -D warnings
          cd ../ionotrace-python && cargo clippy --all-targets --all-features -- -D warnings

      - name: Test Native
        run: |
          cd packages/raytrace_core && cargo test --all-features
          cd ../ionotrace-python && cargo test --all-features
