name: Publish to PyPI

on:
    workflow_dispatch:
    push:
        branches: [main]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            id-token: write

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Build
              run: |
                  pip install build
                  python -m build packages/ionotrace-python/placeholder

            - name: Publish
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: packages/ionotrace-python/placeholder/dist/
