services:
  backend:
    build: packages/backend
    ports:
      - "8000:8000"
    volumes:
      - ./packages/backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
  frontend:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./apps/frontend:/usr/share/nginx/html
