[package]
name = "ionotrace"
version = "0.5.4"
edition = "2021"
rust-version = "1.70"
authors = ["Andrew Wetzel <andrew@wetzel.work>"]
description = "High-performance ionospheric ray tracing engine — Hamilton's equations for HF radio propagation through a magnetized, collisional plasma"
license = "MIT"
repository = "https://github.com/andrewwetzel/raytracing"
homepage = "https://github.com/andrewwetzel/raytracing"
readme = "README.md"
keywords = ["ionosphere", "ray-tracing", "radio-propagation", "hf", "wasm"]
categories = ["science", "simulation"]
exclude = ["tests/"]

[lib]
name = "ionotrace"
crate-type = ["cdylib", "rlib"]

[dependencies]
csv = "1.3.1"
derive_builder = "0.20.2"
rayon = "1.10.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1.44"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tracing-subscriber = "0.3.22"

[[bench]]
name = "bench_single_ray"
harness = false

[[bench]]
name = "bench_fan_trace"
harness = false

[[bench]]
name = "bench_throughput"
harness = false

[package.metadata.docs.rs]
all-features = true
