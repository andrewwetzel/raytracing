# Real Ionosphere Sample Case
# Uses IRI electron density + IGRF magnetic field for Boulder, CO
# on March 15, 2024 at 14:00 UT (solar max conditions)

transmitter:
  latitude: 40.0 # Boulder, CO (40°N)
  longitude: -105.0 # 105°W
  height: 0.0
  frequency: 10.0 # 10 MHz

environment:
  year: 2024
  month: 3
  day: 15
  hour_ut: 14.0 # 2 PM UT (~8 AM local)
  f107: 150.0 # Solar flux index (moderate-high)

ray:
  mode: extraordinary
  elevation: 20.0
  azimuth: 45.0 # NE direction

models:
  electron_density: iri
  magnetic_field: igrf
  collision: expz2

  # Collision params still needed for EXPZ2 model
  collision_params:
    nu1: 1050000.0
    h1: 100.0
    a1: 0.148
    nu2: 30.0
    h2: 140.0
    a2: 0.0183

integration:
  mode: 2 # Adams-Moulton (no error control)
  step_size: 10.0
  max_steps: 500

output:
  print_every: 10
  phase_path: true
  absorption: true
