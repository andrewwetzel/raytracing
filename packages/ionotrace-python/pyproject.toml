[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "ionotrace"
version = "0.5.0"
description = "High-performance ionospheric ray tracing engine — Python bindings for the Rust ionotrace crate"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">= 3.9"
authors = [{ name = "Andrew Wetzel", email = "andrew@wetzel.work" }]
keywords = ["ionosphere", "ray-tracing", "radio-propagation", "hf", "physics"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Scientific/Engineering :: Physics",
]

[project.optional-dependencies]
test = ["pytest>=7"]

[tool.maturin]
features = ["pyo3/extension-module"]
