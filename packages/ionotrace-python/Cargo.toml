[package]
name = "ionotrace-python"
version = "0.5.8"
edition = "2021"
publish = false

[lib]
name = "ionotrace"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.23", features = ["extension-module"] }
ionotrace_core = { package = "ionotrace", path = "../raytrace_core" }
serde_json = "1"
