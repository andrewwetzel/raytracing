<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Ionospheric Ray Tracer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }

    .code {
      font-size: 6rem;
      font-weight: 600;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    p {
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    a:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Signal Lost</h1>
    <p>The page you're looking for has escaped the ionosphere. It may have exceeded the Maximum Usable Frequency.</p>
    <a href="/">Return to Ray Tracer</a>
  </div>
</body>

</html>
